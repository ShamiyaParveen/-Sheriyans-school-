<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs</title>
    <style>
        #tabs{
             margin: 30px 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tab{
           
            padding: 10px 20px;
            font-size: 20px;
            border: 1px solid #dedede;
            background-color:brown;
            color:white;
            cursor: pointer;
        }
         .detail{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap:20px;
        }
        .detail p{
            display: none;
             margin: 0px 150px;
            padding: 10px 20px;
            font-size: 20px;
            border: 1px solid #dedede;
        }
        
    </style>
</head>
<body>
    <!--Create Tabs and Details when clicked then tab is selected and displayed-->
    <div id="tabs">
        <div id="home" class="tab">Tab1</div>
        <div id="about" class="tab">Tab2</div>
        <div id="contact" class="tab">Tab3</div>
    </div>
    <div class="detail">
        <p id="hometext">Hii there, I m Shamiya Ansari</p>
        <p id="abouttext">Front-end-developer</p>
        <p id="contacttext">Hello Welcome to js practice</p>
    </div>

<!-- Another way to solve -->



<script>
    var tabs = document.querySelectorAll(".tab");
    var text = document.querySelectorAll('.detail p');

    text[0].style.display = "block";

    tabs.forEach(function(tab,index){
       
        tab.addEventListener('click', function(){
             hideAllText();
        text[index].style.display = "block";
    });
    });

    function hideAllText(){
        text.forEach(function(p){
            p.style.display = "none"
        });
    }

</script>


</body>
